name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [ Debug, Release ]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore src/Arch.Tests/Arch.Tests.csproj

      - name: Build
        run: dotnet build src/Arch.Tests/Arch.Tests.csproj --configuration ${{ matrix.configuration }} --no-restore

      - name: Test
        run: dotnet test src/Arch.Tests/Arch.Tests.csproj --configuration ${{ matrix.configuration }} --no-build --verbosity normal
