name: Publish NuGet Package

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore dependencies
        run: dotnet restore src/Arch/Arch.csproj

      - name: Generate version number
        id: version_number
        shell: bash
        run: |
          PACKAGE_VERSION=$(python generate_version.py)
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT

      - name: Build
        run: dotnet build src/Arch/Arch.csproj --configuration Release-Events --no-restore

      - name: Pack
        run: dotnet pack src/Arch/Arch.csproj --configuration Release-Events --no-build --output ./output /p:PackageVersion=${{ steps.version_number.outputs.PACKAGE_VERSION }}

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/ByteSnack/index.json"
          dotnet nuget push ./output/*.nupkg -k ${{ secrets.GITHUB_TOKEN }} -s github --skip-duplicate
